<!DOCTYPE html>
<html>
<head>
    <title>Gaussian Naive Bayes Classifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 500px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        input, button {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .results {
            margin-top: 20px;
            padding: 10px;
            background-color: #e8f5e9;
            border-radius: 5px;
        }
        .error {
            margin-top: 20px;
            padding: 10px;
            background-color: #ffebee;
            color: red;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Gaussian Naive Bayes Classifier</h2>

    <form action="/train" method="POST" enctype="multipart/form-data">
        <label>Upload CSV File:</label>
        <input type="file" name="file" required>

        <label>Target Column Name:</label>
        <input type="text" name="target" placeholder="Enter target column name" required>

        <button type="submit">Train Model</button>
    </form>

    {% if error %}
        <div class="error">
            <strong>Error:</strong> {{ error }}
        </div>
    {% endif %}

    {% if train_accuracy %}
        <div class="results">
            <h3>Results:</h3>
            <p><strong>Training Accuracy:</strong> {{ train_accuracy }}%</p>
            <p><strong>Testing Accuracy:</strong> {{ test_accuracy }}%</p>

            <p><strong>Training Confusion Matrix:</strong></p>
            <pre>{{ train_cm }}</pre>

            <p><strong>Testing Confusion Matrix:</strong></p>
            <pre>{{ test_cm }}</pre>
        </div>
    {% endif %}
</div>

</body>
</html>
